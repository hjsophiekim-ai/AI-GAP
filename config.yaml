mode: "mock"  # dry_run | mock | real

trading:
  total_budget: 10000000
  max_positions: 15
  max_shares_per_stock: 2
  min_gap_rate: 3.0
  max_gap_rate: 15.0
  min_trade_value: 3000000000
  buy_start_time: "09:05"
  buy_end_time: "09:10"
  first_take_profit_rate: 3.0
  second_take_profit_rate: 5.0
  stop_loss_rate: -1.5
  force_sell_time: "13:00"
  emergency_sell_time: "15:10"
  order_type: "limit"
  allow_market_order: false
  min_price: 1000

filters:
  exclude_etf: true
  exclude_etn: true
  exclude_preferred_stock: true
  exclude_spac: true
  exclude_reit: true
  exclude_warning_stock: true
  exclude_halt: true
  min_price: 1000
  max_spread_rate: 1.0

data_source:
  pre_market_primary: "naver"
  regular_market_primary: "kis"
  secondary: "naver"
  use_naver_gap_tab: true
  use_naver_volume_tab: true
  refresh_before_market_open: true
  refresh_after_market_open: true
  market_open_time: "09:00"

naver:
  sise_url: "https://finance.naver.com/sise/"

kis:
  mock:
    app_key_env: "KIS_MOCK_APP_KEY"
    app_secret_env: "KIS_MOCK_APP_SECRET"
    account_no_env: "KIS_MOCK_ACCOUNT_NO"
    product_code_env: "KIS_MOCK_ACCOUNT_PRODUCT_CODE"
    base_url: "https://openapivts.koreainvestment.com:29443"
    enabled: true

  real:
    app_key_env: "KIS_REAL_APP_KEY"
    app_secret_env: "KIS_REAL_APP_SECRET"
    account_no_env: "KIS_ACCOUNT_NO"
    product_code_env: "KIS_ACCOUNT_PRODUCT_CODE"
    base_url: "https://openapi.koreainvestment.com:9443"
    enabled: false

dart:
  enabled: true
  api_key_env: "DART_API_KEY"
  lookback_days: 7
  use_disclosure_score: true
  disclosure_score_weight: 0.10
  max_positive_bonus: 10
  max_negative_penalty: -20
  exclude_severe_risk_disclosure: true

ml:
  use_model: true
  fallback_to_rule_score: true
  model_path: "models/gap_model.pkl"
  feature_importance_path: "models/feature_importance.csv"
  min_training_rows: 500
  ml_weight: 0.6
  rule_weight: 0.4

safety:
  enable_real_trading: false
  require_real_confirm: true
  real_confirm_text: "I_UNDERSTAND_REAL_TRADING_RISK"
  max_real_order_amount: 1000000
  max_real_daily_budget: 1000000
  max_daily_loss_rate: -5.0

logging:
  save_csv: true
  save_db: false
  level: "INFO"
  log_dir: "logs"

candidate_quality_filters:
  enabled: true
  speed_mode: true                      # true: 무거운 필터는 상위 N개에만 적용
  max_candidates_for_heavy_filters: 30  # MA/수익률 필터 적용 상한
  # 빠른 제외 필터
  min_price: 1000                       # 최저 현재가 (원)
  min_trading_value_0920: 3000000000    # 09:20 기준 최소 거래대금 (30억)
  max_open_gap_rate: 12.0               # 최대 허용 갭상승률 (%)
  caution_gap_rate: 7.0                 # 이 이상이면 감점 구간 시작 (%)
  # 과열/급락 필터 (일봉 데이터 필요)
  max_3d_return: 25.0                   # 최근 3일 최대 수익률 (% 초과시 감점)
  max_5d_return: 35.0                   # 최근 5일 최대 수익률 (% 초과시 감점)
  # 장초반 리스크
  max_intraday_drop_from_high: 4.0      # 장초반 고점 대비 허용 낙폭 (%)
  max_ma20_extension_rate: 15.0         # MA20 대비 최대 허용 초과폭 (%)
  # 테마 집중 제한
  max_same_theme_in_top15: 4            # 동일 테마 최대 허용 종목 수
